<body>
    <h1><mark>MANIPULANDO ELEMENTOS (TAGS)</mark> DO HTML ATRAVÉS DO JAVASCRIPT</h1>
    <hr>
    <div>
        <p>ESTAMOS APRENDENDO JAVASCRIPT</p>
        <hr>
        <h3>Aprender é Muito Legal</h3>
        <p>E para ajudar o aprendizado, é PRECISO praticar e exercitar</p>
    </div>
    <script>
        const tags_p = document.getElementsByTagName('p')
        console.log(tags_p);
        let tag_p_1 = tags_p[0];
        console.log(tag_p_1);
        tag_p_1.style.background="black"
        tag_p_1.style.color="white"
        tag_p_1.style.textAlign="center"

        let tag_p_2 = tags_p[1];
        console.log(tag_p_2);
        tag_p_2.style.background="black"
        tag_p_2.style.color="white"
        tag_p_2.style.textAlign="center"
        tag_p_2.style.fontSize="large"

        const tags_h3 = document.getElementsByTagName('h3')
        console.log(tags_h3)
        let tag_h3_1 = tags_h3[0];
        console.log(tag_h3_1);
        tag_h3_1.style.background="red"
        tag_h3_1.style.color="white"
        tag_h3_1.style.textAlign="center"
        tag_h3_1.style.fontSize="large"
    </script>
