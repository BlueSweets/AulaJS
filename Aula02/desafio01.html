<body>
    <h1><mark> DESAFIO 01 - </mark> MANIPULANDO ELEMENTOS (TAGS) DO HTML ATRAVÉS DO JAVASCRIPT</h1>
    <hr>
    <div>
        <p>ESTAMOS APRENDENDO JAVASCRIPT</p>
        <hr>
        <h2>Aprender é Muito Legal</h2>

        <p>Eu fui adicionado de forma DINÃMICA</p>

    <h3>UAAALL!! O JAVASCRIPT É MUITO LEGAL</h3>
    <script>
        const tags_p = document.getElementsByTagName('p')
        console.log(tags_p);
        let tag_p_1 = tags_p[0];
        console.log(tag_p_1);
        tag_p_1.style.background="black"
        tag_p_1.style.color="white"
        tag_p_1.style.textAlign="center"

        console.log(tags_p);
        let tag_p_turma = tags_p[1];
        console.log(tag_p_turma);
        tag_p_turma.style.background="#ffee00"
        tag_p_turma.style.color="black"
        tag_p_turma.style.textAlign="center"

        const tags_h2 = document.getElementsByTagName('h2')
        console.log(tags_h2)
        let tag_h2_1 = tags_h2[0];
        console.log(tag_h2_1);
        tag_h2_1.style.color="black"
        tag_h2_1.style.textAlign="center"

        const tags_body = document.getElementsByTagName('body');
        console.log(tags_body)
        let tag_body = tags_body[0];
        console.log(tag_body);
        tag_body.style.backgroundColor="aqua"
        tag_body.style.color="black"
        
        const tags_div = document.getElementsByTagName('div');
        console.log(tags_div)
        let tag_div = tags_div[0];
        console.log(tag_div);

        tag_div.style.border="5px solid rgb(216, 49, 133)"        
    </script>
